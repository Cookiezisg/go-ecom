# 文件服务配置示例
# 复制此文件为 file-config.yaml 并修改相应配置

# 服务配置
Name: file-service
ListenOn: 0.0.0.0:8012
Mode: dev

# 超时配置
Timeout: 5000

# CPU 降载阈值
CpuThreshold: 900

# 健康检查
Health: true

# 中间件配置
Middlewares:
  Trace: true
  Recover: true
  Stat: true
  Prometheus: true
  Breaker: true

# 日志配置
Log:
  ServiceName: file-service
  Mode: console
  Level: debug
  Path: logs
  Compress: true
  KeepDays: 7
  StackCooldownMillis: 100

# Prometheus 配置
Prometheus:
  Host: 0.0.0.0
  Port: 9102
  Path: /metrics

# 存储配置
Storage:
  Type: local
  LocalPath: ./uploads
  OSS:
    Endpoint: ""
    AccessKeyID: ""
    AccessKeySecret: ""
    BucketName: ""

