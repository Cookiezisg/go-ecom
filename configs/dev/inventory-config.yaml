# 库存服务配置示例
# 复制此文件为 inventory-config.yaml 并修改相应配置

# 服务配置
Name: inventory-service
ListenOn: 0.0.0.0:8084
Mode: dev

# etcd 服务注册发现（开发环境可选）
# Etcd:
#   Hosts:
#     - localhost:2379
#   Key: inventory-service.rpc

# 超时配置
Timeout: 5000

# CPU 降载阈值
CpuThreshold: 900

# 健康检查
Health: true

# 中间件配置
Middlewares:
  Trace: true
  Recover: true
  Stat: true
  Prometheus: true
  Breaker: true

# 日志配置
Log:
  ServiceName: inventory-service
  Mode: console
  Level: debug
  Path: logs
  Compress: true
  KeepDays: 7
  StackCooldownMillis: 100

# Prometheus 配置
Prometheus:
  Host: 0.0.0.0
  Port: 9093
  Path: /metrics

# 数据库配置
Database:
  Driver: mysql
  Host: localhost
  Port: 3306
  User: root
  Password: "123456"
  Database: ecommerce
  Charset: utf8mb4
  MaxOpenConns: 100
  MaxIdleConns: 10
  ConnMaxLifetime: 3600
  ConnMaxIdleTime: 600

# Redis配置（用于库存缓存和分布式锁）
BizRedis:
  Host: localhost
  Port: 6379
  Password: ""
  Database: 1
  PoolSize: 10
  MinIdleConns: 5

# Kafka配置（用于库存变更事件等异步处理）
Kafka:
  Brokers:
    - 127.0.0.1:9092
  Version: 2.8.0

