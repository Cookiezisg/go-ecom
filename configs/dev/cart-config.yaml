# 购物车服务配置示例
# 复制此文件为 cart-config.yaml 并修改相应配置

# 服务配置
Name: cart-service
ListenOn: 0.0.0.0:8085
Mode: dev

# 超时配置
Timeout: 5000

# CPU 降载阈值
CpuThreshold: 900

# 健康检查
Health: true

# 中间件配置
Middlewares:
  Trace: true
  Recover: true
  Stat: true
  Prometheus: true
  Breaker: true

# 日志配置
Log:
  ServiceName: cart-service
  Mode: console
  Level: debug
  Path: logs
  Compress: true
  KeepDays: 7
  StackCooldownMillis: 100

# Prometheus 配置
Prometheus:
  Host: 0.0.0.0
  Port: 9094
  Path: /metrics

# 数据库配置（用于持久化备份）
Database:
  Driver: mysql
  Host: localhost
  Port: 3306
  User: root
  Password: "123456"
  Database: ecommerce
  Charset: utf8mb4
  MaxOpenConns: 100
  MaxIdleConns: 10
  ConnMaxLifetime: 3600
  ConnMaxIdleTime: 600

# Redis配置（主要存储）
BizRedis:
  Host: localhost
  Port: 6379
  Password: ""
  Database: 2
  PoolSize: 10
  MinIdleConns: 5

# JWT配置（用于从 token 中提取 user_id）
JWT:
  Secret: "default-secret-key"  # 与 user-service 保持一致
  Expire: 7200

# 下游服务地址
ProductRpc:
  Endpoint: 127.0.0.1:8081
  Timeout: "5s"

InventoryRpc:
  Endpoint: 127.0.0.1:8084
  Timeout: "5s"

