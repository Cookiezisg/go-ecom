        RpcPath: product.v1.ProductService/CreateProduct
      - Method: options
        Path: /api/v1/products/:id
        RpcPath: product.v1.ProductService/GetProduct
      - Method: get
        Path: /api/v1/products/:id
        RpcPath: product.v1.ProductService/GetProduct
      - Method: put
        Path: /api/v1/products/:id
        RpcPath: product.v1.ProductService/UpdateProduct
      - Method: delete
        Path: /api/v1/products/:id
