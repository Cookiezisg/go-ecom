  # 支付服务
  - Name: payment-service
    Grpc:
      Target: 127.0.0.1:8083
      Timeout: 5000
    Mappings:
      - Method: options
        Path: /api/v1/payments
        RpcPath: payment.v1.PaymentService/CreatePayment
      - Method: post
