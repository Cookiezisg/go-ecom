# API Gateway 配置示例
# 参考: https://go-zero.dev/docs/tutorials/gateway/grpc

Name: api-gateway
Host: 0.0.0.0
Port: 8080
Mode: dev

# 超时配置（毫秒）- 文件上传需要更长时间
Timeout: 60000

# JWT 认证配置
Auth:
  AccessSecret: "your-secret-key"
  AccessExpire: 86400

# 日志配置
Log:
  ServiceName: api-gateway
  Mode: console
  Level: debug
  Path: logs
  Compress: true
  KeepDays: 7
  StackCooldownMillis: 100

# Prometheus 配置（使用不同端口避免与基础设施 Prometheus 冲突）
# 注意：product-service 使用 9092，gateway 使用 9110
Prometheus:
  Host: 0.0.0.0
  Port: 9110
  Path: /metrics

# gRPC 上游服务配置
Upstreams:
  # 用户服务
  - Name: user-service
    Grpc:
      # etcd 服务发现（开发环境可使用直连）
      # Etcd:
      #   Hosts:
      #     - localhost:2379
      #   Key: user-service.rpc
      # 直连模式（开发环境）
      Target: 127.0.0.1:8000
      Timeout: 2000
    # protoDescriptor 模式：需要 proto 文件（生产环境）
    # ProtoSets:
    #   - api/user/v1/user.pb
    # grpcReflection 模式：开发环境使用（不需要 ProtoSets）
    # 路由映射（为每个唯一路径添加一个 OPTIONS 方法支持 CORS 预检请求）
    Mappings:
      - Method: options
        Path: /api/v1/user/register
        RpcPath: user.v1.UserService/Register
      - Method: post
        Path: /api/v1/user/register
        RpcPath: user.v1.UserService/Register
      - Method: options
        Path: /api/v1/user/login
        RpcPath: user.v1.UserService/Login
      - Method: post
        Path: /api/v1/user/login
        RpcPath: user.v1.UserService/Login
      - Method: options
        Path: /api/v1/user/info
        RpcPath: user.v1.UserService/GetUserInfo
      - Method: get
        Path: /api/v1/user/info
        RpcPath: user.v1.UserService/GetUserInfo
      - Method: put
        Path: /api/v1/user/info
        RpcPath: user.v1.UserService/UpdateUserInfo
      - Method: options
        Path: /api/v1/users
        RpcPath: user.v1.UserService/ListUsers
      - Method: get
        Path: /api/v1/users
        RpcPath: user.v1.UserService/ListUsers
      - Method: options
        Path: /api/v1/users/:id
        RpcPath: user.v1.UserService/DeleteUser
      - Method: delete
        Path: /api/v1/users/:id
        RpcPath: user.v1.UserService/DeleteUser
      - Method: options
        Path: /api/v1/user/address
        RpcPath: user.v1.UserService/GetAddressList
      - Method: get
        Path: /api/v1/user/address
        RpcPath: user.v1.UserService/GetAddressList
      - Method: post
        Path: /api/v1/user/address
        RpcPath: user.v1.UserService/AddAddress
      - Method: options
        Path: /api/v1/user/address/:id
        RpcPath: user.v1.UserService/UpdateAddress
      - Method: put
        Path: /api/v1/user/address/:id
        RpcPath: user.v1.UserService/UpdateAddress
      - Method: delete
        Path: /api/v1/user/address/:id
        RpcPath: user.v1.UserService/DeleteAddress

