syntax = "proto3";

package message.v1;

option go_package = "api/message/v1;v1";

// 消息服务
service MessageService {
  // 发送消息
  rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);
  // 获取消息列表
  rpc GetMessageList (GetMessageListRequest) returns (GetMessageListResponse);
  // 标记消息已读
  rpc MarkAsRead (MarkAsReadRequest) returns (MarkAsReadResponse);
  // 批量标记已读
  rpc BatchMarkAsRead (BatchMarkAsReadRequest) returns (BatchMarkAsReadResponse);
  // 获取未读消息数量
  rpc GetUnreadCount (GetUnreadCountRequest) returns (GetUnreadCountResponse);
}

// 消息信息
message Message {
  int64 id = 1;
  int64 user_id = 2;
  int32 type = 3;
  string title = 4;
  string content = 5;
  string link = 6;
  int32 is_read = 7;
  string created_at = 8;
}

// 发送消息请求
message SendMessageRequest {
  int64 user_id = 1;
  int32 type = 2;
  string title = 3;
  string content = 4;
  string link = 5;
}

// 发送消息响应
message SendMessageResponse {
  int32 code = 1;
  string message = 2;
}

// 获取消息列表请求
message GetMessageListRequest {
  int64 user_id = 1;
  int32 type = 2; // 0-全部
  int32 page = 3;
  int32 page_size = 4;
}

// 获取消息列表响应
message GetMessageListResponse {
  int32 code = 1;
  string message = 2;
  repeated Message data = 3;
  int32 total = 4;
}

// 标记消息已读请求
message MarkAsReadRequest {
  int64 user_id = 1;
  int64 message_id = 2;
}

// 标记消息已读响应
message MarkAsReadResponse {
  int32 code = 1;
  string message = 2;
}

// 批量标记已读请求
message BatchMarkAsReadRequest {
  int64 user_id = 1;
  repeated int64 message_ids = 2;
}

// 批量标记已读响应
message BatchMarkAsReadResponse {
  int32 code = 1;
  string message = 2;
}

// 获取未读消息数量请求
message GetUnreadCountRequest {
  int64 user_id = 1;
}

// 获取未读消息数量响应
message GetUnreadCountResponse {
  int32 code = 1;
  string message = 2;
  int32 count = 3;
}
